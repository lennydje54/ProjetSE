# =============================================================================
# docker-compose.yml — Configuration pour lancer WEBS en une seule commande
#
# Ce fichier permet de construire et démarrer l'application avec une seule
# commande "docker compose up" au lieu de devoir taper les commandes docker
# build et docker run séparément.
# =============================================================================

services:
  webs:
    # On construit l'image à partir du Dockerfile qui se trouve dans
    # le dossier courant
    build: .

    # On donne un nom explicite au conteneur pour le retrouver facilement
    container_name: webs-app

    # On mappe le port 5000 du conteneur vers le port 5001 de la machine hôte.
    # On utilise 5001 côté hôte car sur macOS le port 5000 est souvent occupé
    # par AirPlay Receiver. Si tu veux revenir à 5000, il faut d'abord désactiver
    # AirPlay Receiver dans Réglages Système > Général > Partage.
    ports:
      - "5001:5000"

    # On monte le dossier sensor/ en volume pour que les modifications apportées
    # aux données CSV (ou aux fichiers d'index) soient persistantes et visibles
    # depuis l'extérieur du conteneur. Très pratique pour développer.
    volumes:
      - ./sensor:/app/sensor

    # Redémarrer automatiquement le conteneur s'il plante, sauf si on l'arrête
    # volontairement avec docker compose down
    restart: unless-stopped
